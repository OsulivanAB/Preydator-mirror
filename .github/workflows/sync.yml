name: Sync Upstream Preydator

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preydator-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Mirror upstream if changed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mirror repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip zip

      - name: Get upstream repository metadata
        id: upstream_repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          repo_api="https://api.github.com/repos/RagingAltoholic/Preydator"

          response=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$repo_api")

          default_branch=$(echo "$response" | jq -r '.default_branch')

          if [ -z "$default_branch" ] || [ "$default_branch" = "null" ]; then
            echo "ERROR: Could not determine upstream default branch." >&2
            echo "$response" >&2
            exit 1
          fi

          echo "default_branch=$default_branch" >> "$GITHUB_OUTPUT"
          echo "Upstream default branch: $default_branch"

      - name: Get upstream HEAD commit SHA
        id: upstream_head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          branch="${{ steps.upstream_repo.outputs.default_branch }}"
          commit_api="https://api.github.com/repos/RagingAltoholic/Preydator/commits/${branch}"

          response=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$commit_api")

          sha=$(echo "$response" | jq -r '.sha')

          if [ -z "$sha" ] || [ "$sha" = "null" ]; then
            echo "ERROR: Could not parse upstream HEAD SHA." >&2
            echo "$response" >&2
            exit 1
          fi

          short_sha="${sha:0:7}"

          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

          echo "Upstream HEAD SHA: $sha"

      - name: Download upstream source archive
        id: download
        run: |
          set -euo pipefail

          branch="${{ steps.upstream_repo.outputs.default_branch }}"
          archive_url="https://codeload.github.com/RagingAltoholic/Preydator/zip/refs/heads/${branch}"

          rm -rf /tmp/preydator-work
          mkdir -p /tmp/preydator-work

          echo "Downloading $archive_url"
          curl -fsSL "$archive_url" -o /tmp/preydator-work/upstream.zip

          unzip -q /tmp/preydator-work/upstream.zip -d /tmp/preydator-work/extracted

          extracted_dir=$(find /tmp/preydator-work/extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)

          if [ -z "${extracted_dir:-}" ] || [ ! -d "$extracted_dir" ]; then
            echo "ERROR: Could not locate extracted upstream directory." >&2
            find /tmp/preydator-work/extracted -maxdepth 2 -print >&2 || true
            exit 1
          fi

          echo "dir=$extracted_dir" >> "$GITHUB_OUTPUT"
          echo "Extracted source dir: $extracted_dir"

      - name: Locate TOC and determine addon metadata
        id: addon
        run: |
          set -euo pipefail

          upstream_dir="${{ steps.download.outputs.dir }}"

          toc_file=$(find "$upstream_dir" -maxdepth 2 -type f -name 'Preydator.toc' | head -n 1)

          if [ -z "${toc_file:-}" ] || [ ! -f "$toc_file" ]; then
            echo "ERROR: Preydator.toc not found." >&2
            find "$upstream_dir" -maxdepth 2 -print >&2 || true
            exit 1
          fi

          addon_root=$(dirname "$toc_file")
          addon_folder=$(basename "$addon_root")

          version=$(grep -m1 '^## Version:' "$toc_file" \
            | sed 's/^## Version:[[:space:]]*//' \
            | tr -d '[:space:]')

          if [ -z "${version:-}" ]; then
            echo "ERROR: Could not extract version from $toc_file" >&2
            cat "$toc_file" >&2
            exit 1
          fi

          release_tag="v${version}-${{ steps.upstream_head.outputs.short_sha }}"
          zip_name="${addon_folder}-${version}.zip"

          echo "toc_file=$toc_file" >> "$GITHUB_OUTPUT"
          echo "addon_root=$addon_root" >> "$GITHUB_OUTPUT"
          echo "addon_folder=$addon_folder" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"

          echo "Addon folder: $addon_folder"
          echo "Addon version: $version"
          echo "Release tag: $release_tag"

      - name: Skip if this upstream commit is already mirrored
        id: exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag="${{ steps.addon.outputs.release_tag }}"

          if gh release view "$tag" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $tag already exists. Nothing to do."
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $tag does not exist yet."
          fi

      - name: Package WowUp-ready zip
        if: steps.exists.outputs.already_exists == 'false'
        id: package
        run: |
          set -euo pipefail

          addon_root="${{ steps.addon.outputs.addon_root }}"
          addon_folder="${{ steps.addon.outputs.addon_folder }}"
          zip_name="${{ steps.addon.outputs.zip_name }}"

          rm -rf /tmp/preydator-package
          mkdir -p "/tmp/preydator-package/${addon_folder}"

          shopt -s dotglob nullglob

          for item in "$addon_root"/* "$addon_root"/.*; do
            name=$(basename "$item")
            [ -e "$item" ] || continue

            case "$name" in
              .|..|.git|.github|.gitattributes|.gitignore|.vscode|build-release.ps1|issues|CURSEFORGE_DESCRIPTION.md)
                echo "skip: $name"
                ;;
              *)
                echo "include: $name"
                cp -R "$item" "/tmp/preydator-package/${addon_folder}/"
                ;;
            esac
          done

          zip_path="/tmp/preydator-package/${zip_name}"
          (
            cd /tmp/preydator-package
            zip -r "$zip_path" "$addon_folder"
          )

          if [ ! -s "$zip_path" ]; then
            echo "ERROR: Zip file was not created correctly." >&2
            exit 1
          fi

          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"

          echo "Package created: $zip_path"
          unzip -l "$zip_path" | head -n 40

      - name: Create release notes
        if: steps.exists.outputs.already_exists == 'false'
        id: notes
        run: |
          set -euo pipefail

          notes_file="/tmp/preydator-release-notes.md"

          cat > "$notes_file" <<EOF
          ## Automated Mirror Release

          > ⚠️ This is **not an official release**.
          > Full credit for the addon belongs to **RagingAltoholic**.

          This repository exists only to publish a WowUp-compatible mirror package.

          - Original project: https://github.com/RagingAltoholic/Preydator
          - Original author: https://github.com/RagingAltoholic
          - Upstream version: \`${{ steps.addon.outputs.version }}\`
          - Upstream commit: \`${{ steps.upstream_head.outputs.sha }}\`

          Please report addon bugs, issues, and feature requests to the upstream repository, not this mirror.

          ### Installation
          Download \`${{ steps.addon.outputs.zip_name }}\` and extract it into \`Interface/AddOns/\`.

          The resulting addon folder will be:
          \`${{ steps.addon.outputs.addon_folder }}/\`
          EOF

          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.exists.outputs.already_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release create "${{ steps.addon.outputs.release_tag }}" \
            "${{ steps.package.outputs.zip_path }}#${{ steps.addon.outputs.zip_name }}" \
            --repo "${{ github.repository }}" \
            --title "Preydator ${{ steps.addon.outputs.version }} (mirror)" \
            --notes-file "${{ steps.notes.outputs.file }}"

          echo "Release created: ${{ steps.addon.outputs.release_tag }}"
